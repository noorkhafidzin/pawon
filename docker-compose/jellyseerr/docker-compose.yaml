---
services:
  jellyseerr:
    image: ghcr.io/fallenbagel/jellyseerr:latest
    init: true
    container_name: jellyseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Asia/Jakarta
      - PORT=5055
      - APPLICATION_URL=https://jellyseerr.home.noorkhafidzin.com
      - TRUST_PROXY=true
      - COOKIE_SECURE=false
      - COOKIE_SAMESITE=none
    ports:
      - 5055:5055
    volumes:
      - /srv/jellyseerr/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    networks:
      - frontend

networks:
  frontend:
    external: true
  
