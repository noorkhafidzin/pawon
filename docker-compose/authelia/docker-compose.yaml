    restart: "unless-stopped"
    healthcheck:
      ## In production the healthcheck section should be commented.
      disable: true
    environment:
      TZ: "Asia/Jakarta"

  redis:
    image: "redis:alpine"
    container_name: "authelia-redis"
    volumes:
      - "./redis:/data"
    networks:
      - frontend
    restart: "unless-stopped"
    environment:
      TZ: "Asia/Jakarta"

