  public:
    image: "traefik/whoami"
    container_name: "authelia-public-whoami"
    networks:
      frontend: {}
    labels:
      traefik.enable: "true"
      traefik.http.routers.public.rule: "Host(`public.home.zrv.my.id`)"
      traefik.http.routers.public.entrypoints: "websecure"
      traefik.http.routers.public.tls: "true"
      traefik.http.routers.public.tls.certresolver: "cloudflare"
      traefik.http.routers.public.middlewares: "authelia@file"
    restart: "unless-stopped"
