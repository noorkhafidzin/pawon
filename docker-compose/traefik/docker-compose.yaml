services:
  traefik:
    image: traefik:v3.6.5
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend
      - frontend-net
    dns:
      - 1.1.1.1
      - 8.8.8.8
    labels:
      traefik.enable: 'true'
      traefik.http.routers.api.rule: 'Host(`traefik.home.noorkhafidzin.com`)'
      traefik.http.routers.api.entrypoints: 'websecure'
      traefik.http.routers.api.service: 'api@internal'
      traefik.http.routers.api.tls: 'true'
      traefik.http.routers.api.tls.certresolver: 'cloudflare'
      traefik.http.routers.api.middlewares: 'authentik@file'
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      - TZ=Asia/Jakarta
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/config/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./traefik/certs:/var/traefik/certs/:rw
      - ./traefik/config/dynamic-config:/etc/traefik/dynamic:ro
  # whoami:
  #   image: traefik/whoami
  #   container_name: whoami
  #   networks:
  #     - frontend
  #   labels:
  #     - sablier.enable=true
  #     - sablier.group=default
      
  sablier:
    image: sablierapp/sablier:1.10.1
    container_name: traefik-middlewares-sablier
    restart: unless-stopped
    command:
      - start
      - --provider.name=docker
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock'
    networks:
      - frontend
      - frontend-net

networks:
  frontend:
    external: true
  frontend-net:
    external: true
