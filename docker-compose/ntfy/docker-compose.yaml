services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=Asia/Jakarta
      - NTFY_BASE_URL=https://ntfy.noorkhafidzin.com
      - NTFY_CACHE_FILE=/var/lib/ntfy/cache.db
      - NTFY_AUTH_FILE=/var/lib/ntfy/auth.db
      - NTFY_AUTH_DEFAULT_ACCESS=deny-all
      - NTFY_BEHIND_PROXY=true
    user: 1000:1000
    volumes:
      - /var/cache/ntfy:/var/cache/ntfy
      - /srv/ntfy:/etc/ntfy
      - /srv/ntfy/data:/var/lib/ntfy
    ports:
      - 87:80
    healthcheck:
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    restart: unless-stopped
    init: true
    networks:
      - frontend

networks:
  frontend:
    external: true